<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee Grazie — Admin</title>
    <link rel="stylesheet" href="admin.css" />
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
  </head>
  <body>
    <div
      class="sidebar-backdrop"
      id="sidebarBackdrop"
      onclick="closeSidebar()"
    ></div>

    <div class="admin-wrap">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
          <div class="sidebar-logo-name">Coffee Grazie</div>
          <div class="sidebar-logo-sub">Admin Panel</div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-section-label">Menü Yönetimi</div>
          <div
            class="nav-item active"
            id="nav-categories"
            onclick="goToPage('categories')"
          >
            <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"
              />
            </svg>
            Kategoriler
          </div>
          <div
            class="nav-item"
            id="nav-products"
            onclick="goToPage('products')"
          >
            <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M18.6 6.62c-1.44 0-2.8.56-3.77 1.53L12 10.66 10.48 12h.01L7.8 14.39c-.64.64-1.49.99-2.4.99-1.87 0-3.39-1.51-3.39-3.38S3.53 8.62 5.4 8.62c.91 0 1.76.35 2.44 1.03l1.13 1 1.51-1.34L9.22 8.2C8.2 7.18 6.84 6.62 5.4 6.62 2.42 6.62 0 9.04 0 12s2.42 5.38 5.4 5.38c1.44 0 2.8-.56 3.77-1.53l2.83-2.5.01.01L13.52 12h-.01l2.69-2.39c.64-.64 1.49-.99 2.4-.99 1.87 0 3.39 1.51 3.39 3.38s-1.52 3.38-3.39 3.38c-.9 0-1.76-.35-2.44-1.03l-1.14-1.01-1.51 1.34 1.27 1.12c1.02 1.01 2.37 1.57 3.82 1.57 2.98 0 5.4-2.41 5.4-5.38s-2.42-5.37-5.4-5.37z"
              />
            </svg>
            Ürünler
          </div>
        </nav>
      </aside>

      <div class="content">
        <div class="topbar">
          <button
            class="hamburger"
            id="hamburgerBtn"
            onclick="toggleSidebar()"
            aria-label="Menü"
          >
            <span></span><span></span><span></span>
          </button>
          <div class="topbar-title" id="topbarTitle">Kategoriler</div>
          <div class="topbar-actions" id="topbarActions"></div>
        </div>

        <!-- CATEGORIES -->
        <div class="page active" id="page-categories">
          <div class="config-banner" id="configBanner" style="display: none">
            <div class="config-banner-icon">⚠️</div>
            <div class="config-banner-text">
              <strong>Firebase bağlantısı yok</strong> — Demo modda
              çalışıyor.<br />
              <code>admin.js</code> dosyasındaki
              <code>firebaseConfig</code> değerlerini doldur.
            </div>
          </div>
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 20px;
              flex-wrap: wrap;
              gap: 10px;
            "
          >
            <div style="font-size: 13px; color: var(--muted)">
              Menü kategorilerini buradan yönet
            </div>
            <button class="btn btn-primary" onclick="openDrawer('add-cat')">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
              </svg>
              Kategori Ekle
            </button>
          </div>
          <div class="categories-grid" id="catGrid"></div>
        </div>

        <!-- PRODUCTS -->
        <div class="page" id="page-products">
          <div class="products-header">
            <div
              style="
                display: flex;
                align-items: center;
                gap: 8px;
                flex-wrap: wrap;
              "
            >
              <span style="font-size: 13px; color: var(--muted)">Ürünler</span>
              <span
                style="font-size: 13px; color: var(--gold); font-weight: 500"
                id="productsFilter"
              ></span>
            </div>
            <div style="display: flex; gap: 8px; flex-wrap: wrap">
              <button
                class="btn btn-outline"
                onclick="
                  filterCatId = null;
                  renderProductTable();
                "
              >
                Tümü
              </button>
              <button
                class="btn btn-primary"
                onclick="openDrawer('add-product')"
              >
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                >
                  <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
                </svg>
                Ürün Ekle
              </button>
            </div>
          </div>
          <div class="card">
            <table class="product-table">
              <thead>
                <tr>
                  <th style="width: 56px"></th>
                  <th>Ürün</th>
                  <th>Fiyat</th>
                  <th class="hide-mobile">Kategori</th>
                  <th class="hide-mobile">İçerik</th>
                  <th>İşlem</th>
                </tr>
              </thead>
              <tbody id="productTbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div
      class="drawer-overlay"
      id="drawerOverlay"
      onclick="closeDrawer()"
    ></div>
    <div class="drawer" id="drawer">
      <div class="drawer-header">
        <div class="drawer-title" id="drawerTitle"></div>
        <button class="drawer-close" onclick="closeDrawer()">×</button>
      </div>
      <div class="drawer-body" id="drawerBody"></div>
      <div class="drawer-footer">
        <button class="btn btn-outline" onclick="closeDrawer()">İptal</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveDrawer()">
          Kaydet
        </button>
      </div>
    </div>

    <div class="toast-wrap" id="toastWrap"></div>
    <script src="admin.js"></script>
  </body>
</html>
